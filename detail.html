<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APP详情 - 挖赚网</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ===== 详情页专属样式 ===== */
    body.detail-page {
      padding-bottom: 0;
    }

    .detail-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 15px;
    }

    /* ===== 面包屑导航 ===== */
    .detail-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 0 12px;
      font-size: 13px;
      color: #999;
      flex-wrap: wrap;
    }
    .detail-breadcrumb a {
      color: #666;
      text-decoration: none;
      transition: color 0.2s;
    }
    .detail-breadcrumb a:hover { color: #ff6b35; }
    .detail-breadcrumb .sep {
      color: #ddd;
      font-size: 11px;
    }
    .detail-breadcrumb .current {
      color: #ff6b35;
      font-weight: 500;
    }

    /* ===== APP信息卡片 ===== */
    .app-info-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 15px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }

    .app-info-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }

    .app-info-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #ff6b35, #ff8f5e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(255,107,53,0.28);
      position: relative;
    }
    .app-info-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 18px;
      position: relative;
      z-index: 2;
    }
    .app-info-icon .icon-fallback {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
    }

    .app-info-main {
      flex: 1;
      min-width: 0;
    }

    .app-info-name {
      font-size: 22px;
      font-weight: 700;
      color: #333;
      margin-bottom: 4px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: break-all;
    }

    .app-info-subtitle {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .app-info-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .app-info-tag {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .app-info-tag.primary {
      background: #fff5f0;
      color: #ff6b35;
    }
    .app-info-tag.secondary {
      background: #f5f5f5;
      color: #888;
    }

    /* ===== 下载按钮区 ===== */
    .app-download-area {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .btn-main-download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #ff6b35, #ff8f5e);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(255,107,53,0.25);
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-main-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,107,53,0.35);
    }
    .btn-main-download:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(255,107,53,0.2);
    }
    .btn-main-download svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .qrcode-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #aaa;
    }
    .qrcode-hint svg {
      width: 16px;
      height: 16px;
      color: #bbb;
    }

    /* ===== APP元信息网格 ===== */
    .app-meta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0;
    }

    .app-meta-item {
      display: flex;
      padding: 10px 0;
      border-bottom: 1px solid #fafafa;
      font-size: 14px;
    }
    .app-meta-label {
      color: #bbb;
      min-width: 64px;
      flex-shrink: 0;
    }
    .app-meta-value {
      color: #333;
      font-weight: 500;
      word-break: break-all;
    }

    /* ===== 纠错留言 ===== */
    .app-feedback-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 16px;
      padding: 6px 14px;
      background: #fafafa;
      border-radius: 6px;
      font-size: 13px;
      color: #999;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      text-decoration: none;
    }
    .app-feedback-link:hover {
      color: #ff6b35;
      background: #fff5f0;
    }
    .app-feedback-link svg {
      width: 14px;
      height: 14px;
    }

    /* ===== 文章正文内容区 ===== */
    .article-content-block {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 15px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      min-height: 120px; /* 固定最小高度，防止加载时容器伸缩 */
    }

    .article-section-title {
      font-size: 18px;
      font-weight: 700;
      color: #333;
      margin-bottom: 16px;
      padding-left: 12px;
      border-left: 4px solid #ff6b35;
      line-height: 1.3;
    }

    .article-section-title.hashtag {
      color: #ff6b35;
      border-left: none;
      padding-left: 0;
      font-size: 17px;
    }

    .article-text {
      font-size: 15px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .article-feature-list {
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
    }
    .article-feature-list li {
      position: relative;
      padding: 6px 0 6px 24px;
      font-size: 14px;
      color: #555;
      line-height: 1.7;
    }
    .article-feature-list li::before {
      content: '';
      position: absolute;
      left: 4px;
      top: 13px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff6b35;
    }

    .article-highlight-box {
      background: #fff8f5;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      border: 1px solid #fff0e8;
    }

    /* ===== 截图缩略图网格（默认3列） ===== */
    .screenshots-gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .ss-thumb-item {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #f0f0f0;
      cursor: pointer;
      aspect-ratio: 9 / 16;
      transition: transform 0.25s, box-shadow 0.25s;
      -webkit-user-select: none;
      user-select: none;
    }
    .ss-thumb-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .ss-thumb-item:active {
      transform: scale(0.97);
    }
    .ss-thumb-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .ss-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 13px;
      background: linear-gradient(135deg, #f8f8f8, #f0f0f0);
    }
    /* 缩略图hover遮罩 */
    .ss-thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .ss-thumb-item:hover .ss-thumb-overlay {
      opacity: 1;
    }
    .ss-thumb-overlay-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ss-thumb-overlay-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #ff6b35;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 移动端缩略图适配 */
    @media (max-width: 600px) {
      .screenshots-gallery {
        gap: 6px;
      }
      .ss-thumb-item {
        border-radius: 8px;
      }
      .ss-thumb-overlay-icon {
        width: 28px;
        height: 28px;
      }
      .ss-thumb-overlay-icon svg {
        width: 14px;
        height: 14px;
      }
    }

    /* ===== 全屏查看器 ===== */
    .ss-viewer {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }
    .ss-viewer.active {
      opacity: 1;
      visibility: visible;
    }

    /* 查看器 - 图片容器（支持滑动切换） */
    .ss-viewer-track {
      display: flex;
      align-items: center;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
      height: 100%;
      width: 100%;
    }
    .ss-viewer-slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }
    .ss-viewer-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      transition: opacity 0.3s;
    }
    .ss-viewer-img.loading {
      opacity: 0.4;
    }

    /* 全屏 - 幻灯片操作按钮（默认隐藏，点击图片后显示） */
    .ss-viewer-action-btn {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10001;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #ff6b35, #ff8f5e);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 26px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,107,53,0.4);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease,
                  visibility 0.3s ease,
                  box-shadow 0.25s ease,
                  background 0.25s ease,
                  transform 0.25s ease;
      white-space: nowrap;
    }
    .ss-viewer-action-btn.active {
      opacity: 1;
      visibility: visible;
    }
    .ss-viewer-action-btn:hover {
      background: linear-gradient(135deg, #e55a2b, #ff7a45);
      box-shadow: 0 6px 28px rgba(255,107,53,0.55);
      transform: translateX(-50%) translateY(-2px);
    }
    .ss-viewer-action-btn:active {
      transform: translateX(-50%) translateY(0) scale(0.96);
      box-shadow: 0 3px 14px rgba(255,107,53,0.35);
    }
    .ss-viewer-action-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* 全屏 - 关闭按钮（默认隐藏，点击图片后显示） */
    .ss-viewer-close {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10001;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.5);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease,
                  visibility 0.3s ease,
                  background 0.25s,
                  border-color 0.25s,
                  transform 0.25s;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .ss-viewer-close.active {
      opacity: 1;
      visibility: visible;
    }
    .ss-viewer-close:hover {
      background: rgba(255,77,79,0.85);
      border-color: rgba(255,255,255,0.6);
      transform: scale(1.08);
    }
    .ss-viewer-close:active {
      transform: scale(0.94);
    }
    .ss-viewer-close svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 全屏 - 左右箭头（默认隐藏，点击图片后显示） */
    .ss-viewer-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10001;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease,
                  visibility 0.3s ease,
                  background 0.25s,
                  transform 0.25s;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .ss-viewer-arrow.active {
      opacity: 1;
      visibility: visible;
    }
    .ss-viewer-arrow:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-50%) scale(1.08);
    }
    .ss-viewer-arrow:active {
      transform: translateY(-50%) scale(0.92);
    }
    .ss-viewer-arrow svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .ss-viewer-arrow-left { left: 16px; }
    .ss-viewer-arrow-right { right: 16px; }

    /* 全屏 - 底部信息栏（默认隐藏，点击图片后显示） */
    .ss-viewer-info {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10001;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .ss-viewer-info.active {
      opacity: 1;
      visibility: visible;
    }
    .ss-viewer-counter {
      font-size: 15px;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
      letter-spacing: 1px;
    }
    .ss-viewer-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .ss-viewer-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: none;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
      padding: 0;
    }
    .ss-viewer-dot.active {
      background: #ff6b35;
      box-shadow: 0 0 8px rgba(255,107,53,0.6);
      width: 24px;
      border-radius: 4px;
    }

    /* 全屏 - 移动端适配 */
    @media (max-width: 600px) {
      .ss-viewer-slide {
        padding: 50px 10px;
      }
      .ss-viewer-close {
        top: 12px;
        right: 12px;
        width: 38px;
        height: 38px;
      }
      .ss-viewer-close svg {
        width: 18px;
        height: 18px;
      }
      .ss-viewer-arrow {
        width: 38px;
        height: 38px;
      }
      .ss-viewer-arrow svg {
        width: 20px;
        height: 20px;
      }
      .ss-viewer-arrow-left { left: 8px; }
      .ss-viewer-arrow-right { right: 8px; }
      .ss-viewer-info {
        padding: 12px 16px;
      }
      .ss-viewer-counter {
        font-size: 14px;
      }
    }

    /* ===== 猜你喜欢 / 相关APP ===== */
    .related-block {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }

    .block-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
      position: relative;
      padding-left: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .block-title::before {
      content: '';
      position: absolute;
      left: 0;
      top: 3px;
      bottom: 3px;
      width: 4px;
      background: #ff6b35;
      border-radius: 2px;
    }

    .related-app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      min-height: 200px; /* 固定最小高度，防止加载时容器伸缩 */
    }

    .related-app-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 8px;
      border-radius: 10px;
      background: #fafafa;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .related-app-card:hover {
      background: var(--hover-bg-related, transparent);
      transform: translateY(-2px);
    }
    .related-app-card .app-icon-sm {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #ff6b35, #ff8f5e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .related-app-card .app-icon-sm img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 14px;
    }
    .related-app-card .app-icon-sm .icon-fallback {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .related-app-name {
      font-size: 13px;
      font-weight: 500;
      color: #333;
      text-align: center;
      margin-bottom: 4px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .related-app-downloads {
      font-size: 11px;
      color: #bbb;
      margin-bottom: 8px;
    }
    .related-app-btn {
      display: inline-block;
      padding: 3px 14px;
      background: #ff6b35;
      color: #fff;
      font-size: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .related-app-btn:hover {
      background: #e55a2b;
    }

    /* ===== 热门文章列表 ===== */
    .hot-articles-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 80px; /* 固定最小高度，防止容器伸缩 */
    }
    .hot-article-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f8f8f8;
      font-size: 14px;
      color: #333;
      text-decoration: none;
      transition: color 0.2s;
    }
    .hot-article-item:hover {
      color: #ff6b35;
    }
    .hot-article-item:last-child {
      border-bottom: none;
    }
    .hot-article-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hot-article-arrow {
      color: #ddd;
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* ===== 排行榜 ===== */
    .rank-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }
    .rank-tab {
      padding: 5px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #999;
      cursor: pointer;
      background: #f5f5f5;
      border: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, color 0.2s;
      transform: none;
    }
    .rank-tab.active {
      background: #ff6b35;
      color: #fff;
    }
    .rank-tab:hover:not(.active) {
      background: #eee;
      color: #666;
    }
    .rank-tab:active {
      transform: none;
    }

    .rank-list {
      display: flex;
      flex-direction: column;
      gap: 0;

    }
    .rank-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f8f8f8;

      color: inherit;
      transition: background 0.15s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .rank-item:hover {
      background: #fafafa;
    }
    .rank-item:focus-visible {
      background: #fafafa;
      border-radius: 4px;
    }
    .rank-item:active {
      transform: none;
    }
    .rank-item:last-child {
      border-bottom: none;
    }
    .rank-num {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-right: 14px;
      background: #f5f5f5;
      overflow: hidden;
      position: relative;
    }
    .rank-num img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      display: block;
      position: relative;
      z-index: 2;
    }
    .rank-num .rank-icon-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: inherit;
      z-index: 1;
    }
    .rank-num .rank-icon-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff6b35, #ff8f5e);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border-radius: inherit;
    }
    .rank-num.rank-num-top {
      box-shadow: 0 2px 10px rgba(255,107,53,0.3);
      border: 2px solid #ff6b35;
    }
    .rank-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .rank-name {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rank-desc {
      font-size: 12px;
      color: #aaa;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rank-downloads {
      font-size: 12px;
      color: #bbb;
      flex-shrink: 0;
      margin-left: 12px;
    }

    /* 排行榜空状态 */
    .rank-empty {
      text-align: center;
      padding: 40px 20px;
      color: #bbb;
      min-height: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

    /* 排行榜加载状态 */
    .rank-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 32px 20px;
      color: #999;
      font-size: 13px;
      min-height: 480px;
    }
    .rank-loading-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #eee;
      border-top-color: #ff6b35;
      border-radius: 50%;
      animation: rankSpin 0.6s linear infinite;
    }
    @keyframes rankSpin {
      to { transform: rotate(360deg); }
    }

    /* ===== 标签云 ===== */
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 48px; /* 固定最小高度，防止刷新时容器伸缩 */
    }
    .tag-cloud-item {
      display: inline-block;
      padding: 4px 12px;
      background: #f5f5f5;

      transition: background 0.2s, color 0.2s;

    .tag-cloud-item:hover {
      background: #fff5f0;
      color: #ff6b35;
    }

    /* 标签云/猜你喜欢刷新按钮 */
    .tag-refresh-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fff;
      color: #888;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      padding: 0;
      font-size: 0;
      line-height: 0;

    .tag-refresh-btn:hover {
      background: #fff5f0;
      color: #ff6b35;
      border-color: #ff6b35;
    }
    .tag-refresh-btn:active {
      background: #fff5f0;
      color: #ff6b35;
      border-color: #ff6b35;
    }
    .tag-refresh-btn.spinning svg {
      animation: refreshSpin 0.7s linear infinite;
    }
    @keyframes refreshSpin {
      to { transform: rotate(360deg); }
    }

    /* 猜你喜欢加载/空状态 */
    .related-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 32px 20px;
      color: #999;
      font-size: 13px;
      min-height: 200px; /* 固定最小高度，防止加载时容器伸缩 */
    }
    .related-loading-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #eee;
      border-top-color: #ff6b35;

      animation: spin 0.6s linear infinite;

    }
    .related-empty {
      text-align: center;
      padding: 32px 20px;
      color: #999;
      font-size: 13px;
      min-height: 200px; /* 固定最小高度，与 loading 状态一致 */
    }

    /* 猜你喜欢卡片进入动画 */
    .related-app-card {
      opacity: 0;
      transform: translateY(8px);
      animation: relatedFadeIn 0.35s ease forwards;
    }
    @keyframes relatedFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== 上一页/下一页导航 ===== */
    .post-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 15px;
    }
    .post-nav-link {
      flex: 1;
      min-width: 0;
      padding: 10px 16px;
      background: #fff;
      border-radius: 10px;
      font-size: 13px;
      color: #666;
      text-decoration: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);

      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .post-nav-link:hover {
      color: #ff6b35;
      box-shadow: 0 2px 8px rgba(255,107,53,0.1);
    }
    .post-nav-link.disabled {
      color: #ccc;
      cursor: default;
      pointer-events: none;
    }

    /* ===== 加载中 ===== */
    .detail-loading {
      padding: 60px 20px;
      text-align: center;
      color: #bbb;
      font-size: 15px;
      min-height: 100vh; /* 固定最小高度，防止加载时页面抖动伸缩 */
    }
    .detail-loading .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid #f0f0f0;
      border-top-color: #ff6b35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .detail-container {
        padding: 10px;

      }

        width: 36px;

      .rank-list {

    @media (max-width: 480px) {

      }
      .related-app-downloads {

  </style>

<body class="detail-page">

            <rect width="64" height="64" rx="14" fill="url(#lgd)"/>

        <a href="#">广告报价</a>
      </div>
      <div class="footer-info" id="detailFooterInfo">
        Copyright © 2025 挖赚网<br>渝公网安备50023802000211号 | 渝ICP备2021014403号-4
      </div>
    </div>
  </footer>

  <script src="sync-engine.js"></script>
  <script>
    // ===== SVG 图标 =====
    var _dlIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>';
    var _qrIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><line x1="14" y1="14" x2="14" y2="14.01"/><line x1="18" y1="14" x2="18" y2="14.01"/><line x1="14" y1="18" x2="18" y2="18"/><line x1="18" y1="21" x2="21" y2="18"/></svg>';
    var _arrowRight = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>';
    var _editIcon = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    var _refreshIcon = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>';

    var _appId = 0;
    var _fromTab = 'home';
    var _siteData = null;
    var _currentApp = null;

    // ===== 初始化 =====
    async function init() {
      var params = new URLSearchParams(window.location.search);
      _appId = parseInt(params.get('id')) || 0;
      _fromTab = params.get('from') || 'home';

      await SyncEngine.start();
      SyncEngine.on('dataUpdated', function(e) {
        _siteData = e.data;
        // 数据更新后清除详情页缓存，确保重新随机
        _lastRelatedNames = [];
        clearRelatedCache();
        _lastTagTexts = [];
        clearTagCloudCache();
        renderAll();
      });

      _siteData = SyncEngine.getData();
      if (!_siteData) _siteData = getFallbackData();

      renderAll();
    }

    // ===== 渲染所有 =====
    function renderAll() {
      if (!_siteData) return;

      // 动态应用模块悬停背景色（从 siteInfo 读取）
      var si = _siteData.siteInfo;
      if (si) {
        var root = document.documentElement;
        root.style.setProperty('--hover-bg-recommend', si.hoverBgRecommend || 'transparent');
        root.style.setProperty('--hover-bg-special', si.hoverBgSpecial || 'transparent');
        root.style.setProperty('--hover-bg-latestApp', si.hoverBgLatestApp || 'transparent');
        root.style.setProperty('--hover-bg-related', si.hoverBgRelated || 'transparent');
      }

      // 更新顶部导航Logo
      updateHeaderFromData();

      // 查找APP
      var app = findAppById(_siteData, _appId);
      if (!app) {
        var allApps = getAllAppList(_siteData);
        app = allApps.length > 0 ? allApps[0] : null;
      }
      _currentApp = app;

      if (app) {
        document.title = app.name + ' - 挖赚网';
        renderDetailPage(app);
      } else {
        document.getElementById('detailContainer').innerHTML =
          '<div class="detail-loading">APP不存在</div>';
      }
    }

    // ===== 更新顶部导航 =====
    function updateHeaderFromData() {
      var si = _siteData.siteInfo;
      if (!si) return;

      var logoEl = document.getElementById('detailLogoText');
      if (logoEl) logoEl.textContent = si.logoText || si.name || '挖赚';
      var sloganEl = document.getElementById('detailLogoSlogan');
      if (sloganEl) sloganEl.textContent = si.logoSlogan || '';

      // 动态渲染导航标签（从 data.json 读取）
      var navEl = document.getElementById('detailNavTabs');
      if (navEl && _siteData.navTabs) {
        var sortedTabs = [].concat(_siteData.navTabs).sort(function(a, b) {
          return (a.sort || 99) - (b.sort || 99);
        });
        navEl.innerHTML = sortedTabs.map(function(tab) {
          var isActive = tab.id === _fromTab;
          return '<a class="nav-item' + (isActive ? ' active' : '') + '" href="index.html#' + tab.id + '">' + tab.name + '</a>';
        }).join('');
      }

      // 页脚
      var flEl = document.getElementById('detailFooterLinks');
      if (flEl && si.footerLinks) {
        flEl.innerHTML = si.footerLinks.filter(function(l) { return l.text; }).map(function(l) {
          return '<a href="' + l.url + '">' + l.text + '</a>';
        }).join('');
      }
      var fflEl = document.getElementById('detailFriendLinks');
      if (fflEl && si.friendLinks) {
        fflEl.innerHTML = '友情链接：' + si.friendLinks.map(function(l) {
          return '<a href="' + l.url + '">' + l.text + '</a>';
        }).join(' | ');
      }
      var fiEl = document.getElementById('detailFooterInfo');
      if (fiEl && si) {
        var emailVisible = si.emailVisible !== false;
        var email = emailVisible ? (si.email || '') : '';
        var emailHtml = email ? '<span class="footer-email"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg> <a href="mailto:' + email + '">' + email + '</a></span><br>' : '';
        fiEl.innerHTML = emailHtml + (si.copyright || '') + '<br>' + (si.police || '') + ' | ' + (si.icp || '');
      }
    }

    // ===== 渲染详情页 =====
    function renderDetailPage(app) {
      var container = document.getElementById('detailContainer');

      // 面包屑（首页 → 分类 → 当前APP，当 from=home 时省略重复的中间层级）
      var categoryLabel = app.category || '赚钱APP';
      var tabName = getTabName(_fromTab);
      var midCrumb = (_fromTab === 'home')
        ? ''
        : '<span class="sep">&gt;</span><a href="index.html#' + _fromTab + '">' + tabName + '</a>';
      var breadcrumb = '<div class="detail-breadcrumb">' +
        '<a href="index.html">首页</a>' +
        midCrumb +
        '<span class="sep">&gt;</span>' +
        '<span class="current">' + app.name + '</span>' +
        '</div>';

      // APP信息卡片
      var cardHtml = renderAppInfoCard(app);

      // 文章内容区（截图 + 简介 + 功能列表）
      var contentHtml = renderArticleContent(app);

      // 猜你喜欢
      var relatedHtml = renderRelatedApps(app);

      // 热门文章
      var hotArticlesHtml = renderHotArticles();

      // 排行榜
      var rankHtml = renderRankList();

      // 标签云
      var tagCloudHtml = renderTagCloud();

      // 上一页/下一页
      var postNavHtml = renderPostNav(app);

      container.innerHTML = breadcrumb +
        cardHtml +
        contentHtml +
        postNavHtml +
        relatedHtml +
        hotArticlesHtml +
        rankHtml +
        tagCloudHtml;

      // 绑定事件
      bindEvents(app);
    }

    // ===== APP信息卡片 =====
    function renderAppInfoCard(app) {
      var iconHtml = getAppIconHtml(app, 'app-info-icon');

      // 标签区：始终显示 APP 名称标签和分类标签
      var tagsHtml = '';
      if (app.name) {
        tagsHtml += '<span class="app-info-tag primary">' + app.name + 'APP</span>';
      }
      if (app.category) {
        tagsHtml += '<span class="app-info-tag secondary">' + app.category + '</span>';
      }
      // 如果没有任何标签，至少显示一个默认标签
      if (!tagsHtml) {
        tagsHtml = '<span class="app-info-tag primary">' + (app.name || 'APP') + '</span>';
      }

      var subtitle = (app.desc || '').substring(0, 80);
      if ((app.desc || '').length > 80) subtitle += '...';

      var metaItems = [
        { label: '支\u3000持', value: app.platform || '安卓/苹果' },

    // ===== 猜你喜欢（相关APP推荐） =====
    // 记录上一次展示的 APP name 集合，刷新时优先展示不同的
    var _lastRelatedNames = [];
    // 缓存 key：F5 后恢复上次结果，只有点击刷新按钮才重新随机
    var RELATED_CACHE_KEY = 'wazhuan_related_cache_v2';
    var RELATED_APPID_CACHE_KEY = 'wazhuan_related_appid';

    function getRelatedCache() {
      try {
        var cached = localStorage.getItem(RELATED_CACHE_KEY);
        if (cached) return JSON.parse(cached);
      } catch(e) {}
      return null;
    }
    function setRelatedCache(names) {
      try { localStorage.setItem(RELATED_CACHE_KEY, JSON.stringify(names)); } catch(e) {}
    }
    function clearRelatedCache() {
      try { localStorage.removeItem(RELATED_CACHE_KEY); } catch(e) {}

    // 缓存当前APP ID，切换详情页后缓存失效
    function getRelatedAppIdCache() {
      try {
        var v = localStorage.getItem(RELATED_APPID_CACHE_KEY);
        return v ? parseInt(v) : 0;
      } catch(e) { return 0; }

    function setRelatedAppIdCache(appId) {

    function renderRelatedApps(currentApp) {
      var allApps = getAllAppList(_siteData);
      // 排除当前APP（按 name 排除，因为不同分类可能共享相同 id）
      var filtered = allApps.filter(function(a) {
        return a.name !== currentApp.name;
      });
      // 按 name 去重
      var seen = {};
      filtered = filtered.filter(function(a) {
        if (seen[a.name]) return false;
        seen[a.name] = true;
        return true;
      });

      if (filtered.length === 0) {
        return '<div class="related-block" id="relatedBlock">' +
          '<div class="block-title">猜你喜欢 <button class="tag-refresh-btn" title="刷新推荐" onclick="refreshRelatedApps()">' + _refreshIcon + '</button></div>' +
          '<div class="related-empty">暂无更多推荐</div>' +
          '</div>';
      }

      var displayCount = Math.min(8, filtered.length);
      var selected = null;

      // 优先从缓存恢复（同一APP、F5不变，缓存存的是 name 列表）
      var cachedAppId = getRelatedAppIdCache();
      if (cachedAppId === currentApp.id) {
        var cachedNames = getRelatedCache();
        if (cachedNames && cachedNames.length > 0) {
          var nameMap = {};
          filtered.forEach(function(a) { if (!nameMap[a.name]) nameMap[a.name] = a; });
          selected = [];
          var seenNames = {};
          cachedNames.forEach(function(name) {
            if (nameMap[name] && !seenNames[name]) {
              seenNames[name] = true;
              selected.push(nameMap[name]);
            }
          });
          if (selected.length === 0) selected = null;
        }
      }

      // 无缓存 → 重新随机
      if (!selected) {
        selected = pickRandomApps(filtered, _lastRelatedNames, displayCount);
        _lastRelatedNames = selected.map(function(a) { return a.name; });
        // 写入缓存（存 name 列表）
        setRelatedCache(selected.map(function(a) { return a.name; }));
        setRelatedAppIdCache(currentApp.id);
      }

      // 按下载量降序排列（视觉上更有说服力）
      selected.sort(function(a, b) { return (b.downloads || 0) - (a.downloads || 0); });

      var cardsHtml = selected.map(function(app, idx) {
        var iconHtml = getAppIconHtml(app, 'app-icon-sm');
        return '<a class="related-app-card" href="detail.html?id=' + app.id + '&from=' + _fromTab + '" style="animation-delay:' + (idx * 0.04) + 's">' +
          '<div class="app-icon-sm">' + iconHtml + '</div>' +
          '<div class="related-app-name">' + app.name + '</div>' +
          '<div class="related-app-downloads">' + (app.downloads || 0) + '次下载</div>' +
          '<span class="related-app-btn">下载</span>' +
          '</a>';
      }).join('');

      return '<div class="related-block" id="relatedBlock">' +
        '<div class="block-title">猜你喜欢 <button class="tag-refresh-btn" title="刷新推荐，随机展示不同APP" onclick="refreshRelatedApps()">' + _refreshIcon + '</button></div>' +
        '<div class="related-app-grid">' + cardsHtml + '</div>' +
        '</div>';
    }

    // ===== 随机选取APP（按 name 去重，优先选上次未展示的） =====
    function pickRandomApps(allApps, lastNames, count) {
      var lastSet = {};
      lastNames.forEach(function(name) { lastSet[name] = true; });

      var freshPool = [];
      var repeatPool = [];
      var seenFresh = {};
      var seenRepeat = {};
      allApps.forEach(function(a) {
        if (lastSet[a.name]) {
          if (!seenRepeat[a.name]) {
            seenRepeat[a.name] = true;
            repeatPool.push(a);
          }
        } else {
          if (!seenFresh[a.name]) {
            seenFresh[a.name] = true;
            freshPool.push(a);
          }
        }
      });

      function shuffle(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = arr[i];
          arr[i] = arr[j];
          arr[j] = tmp;
        }
        return arr;
      }

      shuffle(freshPool);
      shuffle(repeatPool);

      // 从新鲜池挑选，按 name 去重
      var seenNames = {};
      var result = [];
      for (var i = 0; i < freshPool.length && result.length < count; i++) {
        var app = freshPool[i];
        if (!seenNames[app.name]) {
          seenNames[app.name] = true;
          result.push(app);
        }
      }

      // 不够时从重复池补充
      if (result.length < count) {
        for (var j = 0; j < repeatPool.length && result.length < count; j++) {
          var rapp = repeatPool[j];
          if (!seenNames[rapp.name]) {
            seenNames[rapp.name] = true;
            result.push(rapp);
          }
        }
      }

      return shuffle(result);
    }

    // ===== 刷新猜你喜欢（数据同步与F5一致，但只局部刷新该模块） =====
    window.refreshRelatedApps = async function() {
      var block = document.getElementById('relatedBlock');
      if (!block || !_currentApp) return;

      // 按钮旋转动画
      var btn = block.querySelector('.tag-refresh-btn');
      if (btn) btn.classList.add('spinning');

      // 从 data.json 拉取最新数据
      await SyncEngine.refresh();
      _siteData = SyncEngine.getData();
      if (!_siteData) _siteData = getFallbackData();

      // 清空缓存和上次展示记录，确保重新随机
      _lastRelatedNames = [];
      clearRelatedCache();

      // 只重新渲染猜你喜欢模块（最外层窗口不动）
      var newBlockHtml = renderRelatedApps(_currentApp);
      block.outerHTML = newBlockHtml;

      // 新 block 上的按钮移除 spinning
      var newBlock = document.getElementById('relatedBlock');
      if (newBlock) {
        var btn2 = newBlock.querySelector('.tag-refresh-btn');
        if (btn2) btn2.classList.remove('spinning');
      }

      showToast('猜你喜欢已刷新');
    };

    // ===== 热门文章 =====
    function renderHotArticles() {

    // ===== 排行榜（年/月/周榜差异化去重） =====
    var _currentRankPeriod = 'year'; // 'year' | 'month' | 'week'

    // 基于确定性种子的伪随机（保证同一次数据加载结果一致）
    function seededShuffle(arr, seed) {
      var result = [].concat(arr);
      var s = seed || 42;
      for (var i = result.length - 1; i > 0; i--) {
        s = (s * 16807 + 0) % 2147483647;
        var j = s % (i + 1);
        var tmp = result[i];
        result[i] = result[j];
        result[j] = tmp;
      }
      return result;
    }

    function renderRankList() {
      var allApps = getAllAppList(_siteData);
      // 去重
      var seen = {};
      var uniqueApps = [];
      allApps.forEach(function(a) {
        if (!seen[a.name]) {
          seen[a.name] = true;
          uniqueApps.push(a);
        }
      });

      // 空数据状态
      if (uniqueApps.length === 0) {
        return '<div class="related-block" id="rankBlock">' +
          '<div class="block-title">下载排行</div>' +
          '<div class="rank-empty">' +
            '<div class="rank-empty-icon">' +
              '<svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>' +
              '</svg></div>' +
            '<p>暂无排行数据</p>' +
            '<p class="rank-empty-hint">管理员可在后台添加APP后自动生成排行榜</p>' +
          '</div></div>';
      }

      // 根据不同周期生成差异化排名
      var topApps = buildRankData(uniqueApps, _currentRankPeriod);

      var itemsHtml = topApps.map(function(app, i) {
        var rank = i + 1;
        var rankClass = rank <= 3 ? ' rank-num-top' : '';
        var desc = app.desc || app.category || '';
        if (desc.length > 28) desc = desc.substring(0, 28) + '...';

        // 构建图标HTML
        var iconHtml = buildRankIconHtml(app);

        return '<a class="rank-item" href="detail.html?id=' + app.id + '&from=' + _fromTab + '">' +
          '<span class="rank-num' + rankClass + '">' + iconHtml + '</span>' +
          '<span class="rank-info">' +
            '<span class="rank-name">' + app.name + '</span>' +
            (desc ? '<span class="rank-desc">' + desc + '</span>' : '') +
          '</span>' +
          '<span class="rank-downloads">' + (app.downloads || 0) + '次下载</span>' +
          '</a>';
      }).join('');

      return '<div class="related-block" id="rankBlock">' +
        '<div class="block-title">下载排行</div>' +
        '<div class="rank-tabs">' +
          '<button class="rank-tab' + (_currentRankPeriod === 'year' ? ' active' : '') + '" data-period="year">年榜</button>' +
          '<button class="rank-tab' + (_currentRankPeriod === 'month' ? ' active' : '') + '" data-period="month">月榜</button>' +
          '<button class="rank-tab' + (_currentRankPeriod === 'week' ? ' active' : '') + '" data-period="week">周榜</button>' +
        '</div>' +
        '<div class="rank-list">' + itemsHtml + '</div>' +
        '</div>';
    }

    // ===== 根据周期构建差异化排名 =====
    function buildRankData(uniqueApps, period) {
      // 按下载量排序作为基准
      var byDownloads = [].concat(uniqueApps).sort(function(a, b) {
        return (b.downloads || 0) - (a.downloads || 0);
      });

      var count = Math.min(8, byDownloads.length);

      if (period === 'year') {
        // 年榜：按下载量降序（最权威），取前8
        return byDownloads.slice(0, count);
      } else if (period === 'month') {
        // 月榜：用种子打乱后，重新按下载量 + 小波动排序（模拟月度变化）
        var seed = new Date().getFullYear() * 100 + (new Date().getMonth() + 1);
        var shuffled = seededShuffle(byDownloads, seed);
        // 对下载量加微小随机偏移后重新排序
        var withOffset = shuffled.map(function(a, i) {
          var offset = (seed * (i + 7)) % 5000;
          return { app: a, sortVal: (a.downloads || 0) + offset };
        });
        withOffset.sort(function(a, b) { return b.sortVal - a.sortVal; });
        return withOffset.map(function(item) { return item.app; }).slice(0, count);
      } else {
        // 周榜：更大的随机波动，模拟短期热门
        var seed2 = Date.now().toString().split('').reduce(function(s, c) { return s + parseInt(c); }, 0);
        var shuffled2 = seededShuffle(byDownloads, seed2);
        var withOffset2 = shuffled2.map(function(a, i) {
          var offset = (seed2 * (i + 13)) % 12000;
          return { app: a, sortVal: (a.downloads || 0) + offset };
        });
        withOffset2.sort(function(a, b) { return b.sortVal - a.sortVal; });
        return withOffset2.map(function(item) { return item.app; }).slice(0, count);
      }
    }

    // ===== 标签云 =====
    // 上一次展示的标签文本集合，用于刷新时尽量展示不同的标签
    var _lastTagTexts = [];
    // 缓存 key：F5 后恢复上次结果，只有点击刷新按钮才重新随机
    var TAGCLOUD_CACHE_KEY = 'wazhuan_tagcloud_cache';

    function getTagCloudCache() {
      try {
        var cached = localStorage.getItem(TAGCLOUD_CACHE_KEY);
        if (cached) return JSON.parse(cached);
      } catch(e) {}
      return null;
    }
    function setTagCloudCache(items) {
      try { localStorage.setItem(TAGCLOUD_CACHE_KEY, JSON.stringify(items)); } catch(e) {}
    }
    function clearTagCloudCache() {
      try { localStorage.removeItem(TAGCLOUD_CACHE_KEY); } catch(e) {}
    }

    function renderTagCloud() {
      var allApps = getAllAppList(_siteData);
      // 收集所有标签（APP名称+分类），APP名称标签携带详情页ID
      var tags = [];
      var seen = {};
      allApps.forEach(function(app) {
        if (app.name && !seen[app.name + 'APP']) {
          seen[app.name + 'APP'] = true;
          tags.push({ text: app.name, appId: app.id, count: 1 });
        }
        if (app.category && !seen[app.category]) {
          seen[app.category] = true;
          tags.push({ text: app.category, appId: null, count: 1 });
        }
      });

      if (tags.length === 0) return '';

      var displayCount = Math.min(15, tags.length);
      var selected = null;

      // 柔和色板，用于标签背景随机五颜六色
      var _tagColors = [
        '#FFF0F5','#FFF5EE','#FFF8DC','#F0FFF0','#F0FFFF',
        '#F5F5FF','#FFF0FF','#FFFFF0','#F5FFFA','#F0F8FF',
        '#FAF0E6','#FFEFD5','#E6E6FA','#F0E68C','#D8BFD8',
        '#AFEEEE','#B0E0E6','#FFDAB9','#FFE4E1','#DDA0DD'
      ];

      // 优先从缓存恢复（F5 不变，颜色也恢复）
      var cachedItems = getTagCloudCache();
      if (cachedItems && cachedItems.length > 0) {
        var textMap = {};
        tags.forEach(function(t) { textMap[t.text] = t; });
        selected = [];
        cachedItems.forEach(function(item) {
          var text = typeof item === 'string' ? item : item.text;
          if (textMap[text]) {
            var s = textMap[text];
            s._bg = typeof item === 'string' ? null : item.color;
            // 从缓存恢复 appId（旧缓存无此字段则从标签池补充）
            if (!s.appId && typeof item !== 'string' && item.appId) {
              s.appId = item.appId;
            }
            selected.push(s);
          }
        });
        if (selected.length === 0) selected = null;
      }

      // 无缓存 → 重新随机
      if (!selected) {
        selected = pickRandomTags(tags, _lastTagTexts, displayCount);
        _lastTagTexts = selected.map(function(t) { return t.text; });
        // 写入缓存（附带颜色和appId）
        var cacheItems = selected.map(function(t) {
          t._bg = _tagColors[Math.floor(Math.random() * _tagColors.length)];
          return { text: t.text, color: t._bg, appId: t.appId || null };
        });
        setTagCloudCache(cacheItems);
      }

      var tagsHtml = selected.map(function(t) {
        var bg = t._bg || _tagColors[Math.floor(Math.random() * _tagColors.length)];
        // APP名称标签 → 链接到详情页；分类标签 → 链接到首页搜索
        var href;
        if (t.appId) {
          href = 'detail.html?id=' + t.appId + '&from=' + _fromTab;
        } else {
          href = 'index.html#' + _fromTab + '?tag=' + encodeURIComponent(t.text);
        }
        return '<a class="tag-cloud-item" style="background:' + bg + '" href="' + href + '">' + t.text + '</a>';
      }).join('');

      return '<div class="related-block" id="tagCloudBlock">' +
        '<div class="block-title">标签列表 <button class="tag-refresh-btn" title="刷新标签，随机展示不同标签" onclick="refreshTagCloud()">' + _refreshIcon + '</button></div>' +
        '<div class="tag-cloud">' + tagsHtml + '</div>' +
        '</div>';
    }

    // ===== 随机选取标签（优先选上次未展示的） =====
    function pickRandomTags(allTags, lastTexts, count) {
      // 分为"上次未展示"和"上次已展示"两组
      var lastSet = {};
      lastTexts.forEach(function(t) { lastSet[t] = true; });

      var freshPool = [];
      var repeatPool = [];
      allTags.forEach(function(t) {
        if (lastSet[t.text]) {
          repeatPool.push(t);
        } else {
          freshPool.push(t);
        }
      });

      // 随机打乱函数
      function shuffle(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = arr[i];
          arr[i] = arr[j];
          arr[j] = tmp;
        }
        return arr;
      }

      // 优先从新鲜池中选，不够再从重复池补
      shuffle(freshPool);
      shuffle(repeatPool);

      var result = freshPool.slice(0, count);
      if (result.length < count) {
        result = result.concat(repeatPool.slice(0, count - result.length));
      }
      // 最终再打乱一次，让新旧标签混合展示
      return shuffle(result);
    }

      var nextApp = idx < uniqueApps.length - 1 ? uniqueApps[idx + 1] : null;

      var prevHtml = prevApp
        ? '<a class="post-nav-link" href="detail.html?id=' + prevApp.id + '&from=' + _fromTab + '">上一个：' + prevApp.name + '</a>'

    // ===== 截图缩略图网格 + 全屏查看器 =====
    function initScreenshotViewer(app) {
      var gallery = document.getElementById('ssGallery');

      var screenshots = app.screenshots || [];
      var total = screenshots.length;
      if (total === 0) return;

      // 规范化URL
      var urls = screenshots.map(function(src) {
        var u = src;
        if (u.startsWith('uploads/')) u = '/' + u;
        else if (!u.startsWith('/') && !u.startsWith('http')) u = '/' + u;
        return u;
      });

      // ===== 构建全屏查看器DOM（只建一次，复用） =====
      var viewerEl = document.createElement('div');
      viewerEl.className = 'ss-viewer';
      viewerEl.id = 'ssViewer';
      viewerEl.setAttribute('aria-label', '全屏图片查看器');
      viewerEl.setAttribute('role', 'dialog');

      // 图片滑动轨道
      var trackHtml = '<div class="ss-viewer-track" id="ssViewerTrack">';
      for (var i = 0; i < total; i++) {
        trackHtml += '<div class="ss-viewer-slide">';
        trackHtml += '<img class="ss-viewer-img" src="' + urls[i] + '" alt="截图 ' + (i + 1) + '" draggable="false">';
        trackHtml += '</div>';
      }
      trackHtml += '</div>';
      viewerEl.innerHTML = trackHtml;

      // 关闭按钮
      var closeBtn = document.createElement('button');
      closeBtn.className = 'ss-viewer-close';
      closeBtn.setAttribute('aria-label', '关闭');
      closeBtn.setAttribute('title', '关闭 (ESC)');
      closeBtn.innerHTML = '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

      // 左箭头
      var prevArrow = document.createElement('button');
      prevArrow.className = 'ss-viewer-arrow ss-viewer-arrow-left';
      prevArrow.setAttribute('aria-label', '上一张');
      prevArrow.setAttribute('title', '上一张');
      prevArrow.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>';

      // 右箭头
      var nextArrow = document.createElement('button');
      nextArrow.className = 'ss-viewer-arrow ss-viewer-arrow-right';
      nextArrow.setAttribute('aria-label', '下一张');
      nextArrow.setAttribute('title', '下一张');
      nextArrow.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>';

      // 底部信息栏
      var infoBar = document.createElement('div');
      infoBar.className = 'ss-viewer-info';
      infoBar.innerHTML = '<span class="ss-viewer-counter" id="ssViewerCounter">1 / ' + total + '</span>' +
        '<div class="ss-viewer-dots" id="ssViewerDots">' +
        (function() {
          var dotsHtml = '';
          for (var d = 0; d < total; d++) {
            dotsHtml += '<button class="ss-viewer-dot' + (d === 0 ? ' active' : '') + '" data-index="' + d + '" aria-label="第' + (d + 1) + '张"></button>';
          }
          return dotsHtml;
        })() +
        '</div>';

      // ===== 操作按钮（默认隐藏，点击幻灯片图片后显示） =====
      var actionBtn = document.createElement('button');
      actionBtn.className = 'ss-viewer-action-btn';
      actionBtn.id = 'ssViewerActionBtn';
      actionBtn.setAttribute('aria-label', '下载此APP');
      actionBtn.setAttribute('title', '下载 ' + app.name);
      actionBtn.innerHTML = _dlIcon + '免费下载';

      document.body.appendChild(viewerEl);
      document.body.appendChild(closeBtn);
      document.body.appendChild(prevArrow);
      document.body.appendChild(nextArrow);
      document.body.appendChild(infoBar);
      document.body.appendChild(actionBtn);

      var track = document.getElementById('ssViewerTrack');
      var counter = document.getElementById('ssViewerCounter');
      var dotsContainer = document.getElementById('ssViewerDots');
      var currentIndex = 0;
      var isOpen = false;
      var controlsVisible = false;

      function showAllControls() {
        controlsVisible = true;
        closeBtn.classList.add('active');
        prevArrow.classList.add('active');
        nextArrow.classList.add('active');
        infoBar.classList.add('active');
        actionBtn.classList.add('active');
      }

      function hideAllControls() {
        controlsVisible = false;
        closeBtn.classList.remove('active');
        prevArrow.classList.remove('active');
        nextArrow.classList.remove('active');
        infoBar.classList.remove('active');
        actionBtn.classList.remove('active');
      }

      // ===== 触摸/拖拽状态 =====
      var touchStartX = 0;
      var touchStartY = 0;
      var isDragging = false;
      var dragOffset = 0;

      function goToSlide(index, animate) {
        if (index < 0) index = total - 1;
        if (index >= total) index = 0;
        currentIndex = index;

        if (animate === false) {
          track.style.transition = 'none';
        } else {
          track.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        }
        track.style.transform = 'translateX(-' + (index * 100) + '%)';

        // 更新指示器
        if (dotsContainer) {
          dotsContainer.querySelectorAll('.ss-viewer-dot').forEach(function(d, i) {
            d.classList.toggle('active', i === index);
          });
        }
        // 更新页码
        if (counter) {
          counter.textContent = (index + 1) + ' / ' + total;
        }
      }

      // ===== 打开全屏 =====
      function openViewer(startIndex) {
        if (isOpen) return;
        isOpen = true;
        currentIndex = startIndex || 0;
        goToSlide(currentIndex, false);
        viewerEl.classList.add('active');
        document.body.style.overflow = 'hidden';

        // 默认隐藏所有控件
        hideAllControls();

        // 如果只有一张图，隐藏箭头
        if (total <= 1) {
          prevArrow.style.display = 'none';
          nextArrow.style.display = 'none';
        }
      }

      // ===== 关闭全屏 =====
      function closeViewer() {
        if (!isOpen) return;
        isOpen = false;
        viewerEl.classList.remove('active');
        document.body.style.overflow = '';
        hideAllControls();
        if (total <= 1) {
          prevArrow.style.display = '';
          nextArrow.style.display = '';
        }
      }

      // 操作按钮点击 → 下载APP
      actionBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (app.url && app.url !== '#') {
          window.open(app.url, '_blank');
        } else {
          alert('即将下载 ' + app.name + '，请稍候...');
        }
      });

      // ===== 事件绑定 =====

      // 点击幻灯片图片 → 显示/隐藏控件
      var didDrag = false;
      track.addEventListener('click', function(e) {
        if (!isOpen || didDrag) return;
        // 只有点击在图片/幻灯片区域才触发
        if (!e.target.closest('.ss-viewer-img') && !e.target.closest('.ss-viewer-slide')) return;
        if (controlsVisible) {
          hideAllControls();
        } else {
          showAllControls();
        }
      });

      // 缩略图点击 → 打开全屏
      gallery.addEventListener('click', function(e) {
        var item = e.target.closest('.ss-thumb-item');
        if (!item) return;
        var idx = parseInt(item.getAttribute('data-index'));
        if (!isNaN(idx)) openViewer(idx);
      });

      // 关闭按钮
      closeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        closeViewer();
      });

      // 点击背景蒙层关闭
      viewerEl.addEventListener('click', function(e) {
        if (e.target === viewerEl) closeViewer();
      });

      // 左右箭头
      prevArrow.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isOpen) goToSlide(currentIndex - 1, true);
      });
      nextArrow.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isOpen) goToSlide(currentIndex + 1, true);
      });

      // 指示器点击
      if (dotsContainer) {
        dotsContainer.addEventListener('click', function(e) {
          var dot = e.target.closest('.ss-viewer-dot');
          if (!dot) return;
          var idx = parseInt(dot.getAttribute('data-index'));
          if (!isNaN(idx) && isOpen) goToSlide(idx, true);
        });
      }

      // 键盘导航
      var keyHandler = function(e) {
        if (!isOpen) return;
        if (e.key === 'Escape') {
          e.preventDefault();
          closeViewer();
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          goToSlide(currentIndex - 1, true);
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          goToSlide(currentIndex + 1, true);
        }
      };
      document.addEventListener('keydown', keyHandler);

      // ===== 触摸手势滑动 =====
      track.addEventListener('touchstart', function(e) {
        if (!isOpen) return;
        didDrag = false;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        isDragging = true;
        dragOffset = 0;
        track.style.transition = 'none';
      }, { passive: true });

      track.addEventListener('touchmove', function(e) {
        if (!isOpen || !isDragging) return;
        var dx = e.touches[0].clientX - touchStartX;
        var dy = e.touches[0].clientY - touchStartY;
        if (Math.abs(dy) > Math.abs(dx) && Math.abs(dx) < 10) {
          isDragging = false;
          track.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
          track.style.transform = 'translateX(-' + (currentIndex * 100) + '%)';
          return;
        }
        if (Math.abs(dx) > 5) didDrag = true;
        dragOffset = dx;
        var percent = dx / window.innerWidth * 100;
        track.style.transform = 'translateX(' + (-currentIndex * 100 + percent) + '%)';
      }, { passive: true });

      track.addEventListener('touchend', function(e) {
        if (!isOpen || !isDragging) return;
        isDragging = false;
        track.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';

        var threshold = window.innerWidth * 0.15;
        if (Math.abs(dragOffset) > threshold) {
          if (dragOffset < 0) {
            goToSlide(currentIndex + 1, true);
          } else {
            goToSlide(currentIndex - 1, true);
          }
        } else {
          track.style.transform = 'translateX(-' + (currentIndex * 100) + '%)';
        }
        dragOffset = 0;
        setTimeout(function() { didDrag = false; }, 0);
      });

      // ===== 鼠标拖拽支持（桌面端） =====
      var mouseDown = false;
      var mouseStartX = 0;
      var mouseDragOffset = 0;

      track.addEventListener('mousedown', function(e) {
        if (!isOpen) return;
        didDrag = false;
        mouseDown = true;
        mouseStartX = e.clientX;
        mouseDragOffset = 0;
        track.style.transition = 'none';
        track.style.cursor = 'grabbing';
      });

      document.addEventListener('mousemove', function(e) {
        if (!isOpen || !mouseDown) return;
        var dx = e.clientX - mouseStartX;
        if (Math.abs(dx) > 5) didDrag = true;
        mouseDragOffset = dx;
        var percent = dx / window.innerWidth * 100;
        track.style.transform = 'translateX(' + (-currentIndex * 100 + percent) + '%)';
      });

      document.addEventListener('mouseup', function(e) {
        if (!isOpen || !mouseDown) return;
        mouseDown = false;
        track.style.cursor = '';
        track.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';

        var threshold = window.innerWidth * 0.12;
        if (Math.abs(mouseDragOffset) > threshold) {
          if (mouseDragOffset < 0) {
            goToSlide(currentIndex + 1, true);
          } else {
            goToSlide(currentIndex - 1, true);
          }
        } else {
          track.style.transform = 'translateX(-' + (currentIndex * 100) + '%)';
        }
        mouseDragOffset = 0;
        setTimeout(function() { didDrag = false; }, 0);
      });

      // 阻止图片默认拖拽
      track.addEventListener('dragstart', function(e) {
        e.preventDefault();
      });
    }

    // ===== 获取全量APP列表 =====
    function getAllAppList(data) {
      var allRaw = []
        .concat(data.home && data.home.recommend ? data.home.recommend : [])
        .concat(data.home && data.home.latestApps ? data.home.latestApps : [])
        .concat(data.game && data.game.apps ? data.game.apps : [])
        .concat(data.task && data.task.apps ? data.task.apps : []);
      var map = {};
      allRaw.forEach(function(a) {
        if (!map[a.name]) {
          map[a.name] = a;
        } else {
          var existing = map[a.name];
          if (!existing.desc && a.desc) existing.desc = a.desc;
          if (!existing.url || (existing.url === '#' && a.url && a.url !== '#')) existing.url = a.url;
          if (!existing.platform && a.platform) existing.platform = a.platform;
          if (!existing.appSize && a.appSize) existing.appSize = a.appSize;
          if (!existing.developer && a.developer) existing.developer = a.developer;
          if (!existing.withdrawMethod && a.withdrawMethod) existing.withdrawMethod = a.withdrawMethod;
          if (!existing.category && a.category) existing.category = a.category;
          if (!existing.publishTime && a.publishTime) existing.publishTime = a.publishTime;
          if (!existing.content && a.content) existing.content = a.content;
          if (!existing.features || (existing.features.length === 0 && a.features && a.features.length > 0)) {
            existing.features = a.features;
          }
          if (!existing.screenshots || (existing.screenshots.length === 0 && a.screenshots && a.screenshots.length > 0)) {
            existing.screenshots = a.screenshots;
          }
        }
      });
      return Object.values(map);
    }

    function findAppById(data, appId) {
      var allRaw = []
        .concat(data.home && data.home.recommend ? data.home.recommend : [])
        .concat(data.home && data.home.latestApps ? data.home.latestApps : [])
        .concat(data.game && data.game.apps ? data.game.apps : [])
        .concat(data.task && data.task.apps ? data.task.apps : []);
      return allRaw.find(function(a) { return a.id === appId; }) || null;
    }

    function getFallbackData() {
      return {
        siteInfo: { name: "挖赚网", logoText: "挖赚", logoSlogan: "手机赚钱APP推荐平台" },
        home: { recommend: [], latestApps: [] },
        game: { apps: [] },
        task: { apps: [] },
        special: { articles: [] }
      };
    }

    document.addEventListener('DOMContentLoaded', function() {
      init();
    });
  </script>
  <script src="back-to-top.js"></script>
