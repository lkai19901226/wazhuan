    async function loadArticle() {

      await SyncEngine.start();

      SyncEngine.on('dataUpdated', function (e) {
        _articleData = e.data;
        console.log('[article] 数据更新，来源:', e.source);
        renderArticleFromData();
      });

      _articleData = SyncEngine.getData();
      if (!_articleData) _articleData = getFallbackData();

      renderArticleFromData();
    }

    // ===== 从数据渲染文章（统一入口） =====
    function renderArticleFromData() {
      if (!_articleData) return;
      updateArticleHeaderFromData();
      renderArticle(_articleData, _articleId);
    }

    // ===== 动态渲染导航标签和页脚 =====
    function updateArticleHeaderFromData() {
      var si = _articleData.siteInfo;
      if (!si) return;

      // 动态渲染导航标签（从 data.json navTabs 读取）
      var navEl = document.getElementById('articleNavTabs');
      if (navEl && _articleData.navTabs) {
        var sortedTabs = [].concat(_articleData.navTabs).sort(function(a, b) {
          return (a.sort || 99) - (b.sort || 99);
        });
        navEl.innerHTML = sortedTabs.map(function(tab) {
          var isActive = tab.id === 'special';
          return '<a class="nav-item' + (isActive ? ' active' : '') + '" href="index.html#' + tab.id + '">' + tab.name + '</a>';
        }).join('');
      }
    }

    function renderArticle(data, articleId) {
      const article = data.special.articles.find(a => a.id === articleId);

      if (!article) {
        document.getElementById('articleTitle').textContent = '文章不存在';

      }

      relatedListEl.innerHTML = related.map(function(a) {
        return '<a class="related-item" href="article.html?id=' + a.id + '">' + articleIconSvg + a.title + '</a>';
      }).join('');

      // 渲染页脚
      renderFooter(data);
    }

    function renderFooter(data) {
      const footerLinksEl = document.getElementById('footerLinks');
      if (footerLinksEl && data.siteInfo.footerLinks) {
        footerLinksEl.innerHTML = data.siteInfo.footerLinks.map(link =>
          `<a href="${link.url}">${link.text}</a>`
        ).join('');
      }
      const friendLinksEl = document.getElementById('friendLinks');
      if (friendLinksEl && data.siteInfo.friendLinks) {
        friendLinksEl.innerHTML = '友情链接：' + data.siteInfo.friendLinks.map(link =>
          `<a href="${link.url}">${link.text}</a>`
        ).join(' | ');
      }
      const footerInfoEl = document.getElementById('footerInfo');

      }
