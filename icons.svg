<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="display:none;">
  <defs>
    <!-- 网站Logo图标 - 挖赚 -->
    <symbol id="icon-logo" viewBox="0 0 64 64">
      <rect width="64" height="64" rx="16" fill="url(#logo-grad)"/>
      <text x="32" y="42" text-anchor="middle" font-size="28" font-weight="700" fill="#fff" font-family="sans-serif">挖</text>
      <defs>
        <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ff6b35"/>
          <stop offset="100%" stop-color="#ff8f5e"/>
        </linearGradient>
      </defs>
    </symbol>

    <!-- 首页图标 -->
    <symbol id="icon-home" viewBox="0 0 24 24">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-7H9v7H4a1 1 0 01-1-1V9.5z" fill="currentColor"/>
      <path d="M9 21V14h6v7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </symbol>

    <!-- 游戏图标 -->
    <symbol id="icon-game" viewBox="0 0 24 24">
      <rect x="2" y="6" width="20" height="12" rx="3" fill="currentColor" opacity="0.15"/>
      <path d="M5 10h2v2H5zM9 8h2v2H9zM13 8h2v2h-2zM17 10h2v2h-2z" fill="currentColor"/>
      <path d="M7 14h10a1 1 0 011 1v2a1 1 0 01-1 1H7a1 1 0 01-1-1v-2a1 1 0 011-1z" fill="currentColor" opacity="0.3"/>
      <circle cx="10" cy="15" r="1.5" fill="currentColor"/>
      <circle cx="14" cy="15" r="1.5" fill="currentColor"/>
    </symbol>

    <!-- 任务图标 -->
    <symbol id="icon-task" viewBox="0 0 24 24">
      <path d="M9 11l3 3L22 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 专题图标 -->
    <symbol id="icon-special" viewBox="0 0 24 24">
      <path d="M4 19.5A2.5 2.5 0 016.5 17H20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.5"/>
      <line x1="8" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="11" x2="14" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="15" x2="12" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </symbol>

    <!-- 下载图标 -->
    <symbol id="icon-download" viewBox="0 0 24 24">
      <path d="M12 3v12m0 0l-4-4m4 4l4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 箭头右 -->
    <symbol id="icon-arrow-right" viewBox="0 0 24 24">
      <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 箭头左 -->
    <symbol id="icon-arrow-left" viewBox="0 0 24 24">
      <path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 链接图标 -->
    <symbol id="icon-link" viewBox="0 0 24 24">
      <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 上传图标 -->
    <symbol id="icon-upload" viewBox="0 0 24 24">
      <path d="M12 16V4m0 0L8 8m4-4l4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 图片图标 -->
    <symbol id="icon-image" viewBox="0 0 24 24">
      <rect x="3" y="3" width="18" height="18" rx="2" fill="currentColor" opacity="0.1" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
      <path d="M21 15l-5-5L5 21" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 删除/关闭图标 -->
    <symbol id="icon-close" viewBox="0 0 24 24">
      <path d="M18 6L6 18M6 6l12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 添加图标 -->
    <symbol id="icon-plus" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 刷新图标 -->
    <symbol id="icon-refresh" viewBox="0 0 24 24">
      <path d="M1 4v6h6M23 20v-6h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 保存图标 -->
    <symbol id="icon-save" viewBox="0 0 24 24">
      <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M17 21v-8H7v8" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M7 3v5h8" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <!-- 预览图标 -->
    <symbol id="icon-eye" viewBox="0 0 24 24">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <!-- 文件图标 -->
    <symbol id="icon-folder" viewBox="0 0 24 24">
      <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <!-- 备份图标 -->
    <symbol id="icon-backup" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 15V3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 校验图标 -->
    <symbol id="icon-check" viewBox="0 0 24 24">
      <path d="M22 11.08V12a10 10 0 11-5.93-9.14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 4L12 14.01l-3-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 还原图标 -->
    <symbol id="icon-restore" viewBox="0 0 24 24">
      <path d="M3 12a9 9 0 119 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M3 3v6h6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M3 12a9 9 0 019-9 9.1 9.1 0 016.36 2.64L21 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </symbol>

    <!-- 邮件图标 -->
    <symbol id="icon-mail" viewBox="0 0 24 24">
      <rect x="2" y="4" width="20" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M22 4l-10 8L2 4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 仪表盘图标 -->
    <symbol id="icon-dashboard" viewBox="0 0 24 24">
      <rect x="3" y="3" width="7" height="7" rx="1" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1.5"/>
      <rect x="14" y="3" width="7" height="7" rx="1" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1.5"/>
      <rect x="3" y="14" width="7" height="7" rx="1" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1.5"/>
      <rect x="14" y="14" width="7" height="7" rx="1" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <!-- 设置图标 -->
    <symbol id="icon-settings" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <!-- 导航图标 -->
    <symbol id="icon-nav" viewBox="0 0 24 24">
      <path d="M3 6h18M3 12h18M3 18h18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 文章图标 -->
    <symbol id="icon-article" viewBox="0 0 24 24">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M14 2v6h6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="17" x2="12" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </symbol>

    <!-- 火苗/推荐图标 -->
    <symbol id="icon-fire" viewBox="0 0 24 24">
      <path d="M12 2C8 6 5 9.5 5 14a7 7 0 0014 0c0-4.5-3-8-7-12z" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M12 2c-1.5 2-2.5 4-3 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    </symbol>

    <!-- 消息/提醒图标 -->
    <symbol id="icon-bell" viewBox="0 0 24 24">
      <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M13.73 21a2 2 0 01-3.46 0" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <!-- 用户图标 -->
    <symbol id="icon-user" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M20 21a8 8 0 00-16 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </symbol>

    <!-- 更多图标（三个点） -->
    <symbol id="icon-more" viewBox="0 0 24 24">
      <circle cx="12" cy="5" r="1.5" fill="currentColor"/>
      <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
    </symbol>

    <!-- 标签图标 -->
    <symbol id="icon-tag" viewBox="0 0 24 24">
      <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="7" cy="7" r="1.5" fill="currentColor"/>
    </symbol>

    <!-- 编辑图标 -->
    <symbol id="icon-edit" viewBox="0 0 24 24">
      <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <!-- 导出图标 -->
    <symbol id="icon-export" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 15V3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 复制图标 -->
    <symbol id="icon-copy" viewBox="0 0 24 24">
      <rect x="9" y="9" width="13" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <!-- 搜索图标 -->
    <symbol id="icon-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M16.5 16.5L21 21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 星星图标 -->
    <symbol id="icon-star" viewBox="0 0 24 24">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    </symbol>

    <!-- 心形图标 -->
    <symbol id="icon-heart" viewBox="0 0 24 24">
      <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <!-- 金币图标 -->
    <symbol id="icon-coin" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.1" stroke="currentColor" stroke-width="1.5"/>
      <text x="12" y="16" text-anchor="middle" font-size="12" font-weight="700" fill="currentColor">¥</text>
    </symbol>

    <!-- 成功/确认图标 -->
    <symbol id="icon-success" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M8 12l3 3 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- 警告图标 -->
    <symbol id="icon-warning" viewBox="0 0 24 24">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="12" y1="9" x2="12" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="17" r="0.8" fill="currentColor"/>
    </symbol>

    <!-- 错误图标 -->
    <symbol id="icon-error" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M15 9l-6 6M9 9l6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 信息图标 -->
    <symbol id="icon-info" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <line x1="12" y1="16" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="8" r="0.8" fill="currentColor"/>
    </symbol>

    <!-- 微信图标 -->
    <symbol id="icon-wechat" viewBox="0 0 24 24">
      <path d="M8.5 11a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM15.5 11a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" fill="currentColor"/>
      <path d="M21 13.5c0 3.6-4 6.5-9 6.5-1 0-1.9-.1-2.8-.3l-3.2 1.7v-3.1C3.7 17 2 15.4 2 13.5 2 9.9 6 7 11 7s9 2.9 9 6.5z" fill="none" stroke="currentColor" stroke-width="1.5"/>
    </symbol>

    <!-- 手机图标 -->
    <symbol id="icon-phone" viewBox="0 0 24 24">
      <rect x="5" y="2" width="14" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <line x1="12" y1="18" x2="12" y2="18.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- 照片占位图标 -->
    <symbol id="icon-photo-placeholder" viewBox="0 0 120 120">
      <rect width="120" height="120" rx="8" fill="#f0f0f0"/>
      <path d="M35 80L55 55l15 20 20-25 25 30" fill="none" stroke="#ccc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="45" cy="40" r="8" fill="none" stroke="#ccc" stroke-width="3"/>
    </symbol>
  </defs>
</svg>
